<div class="dashboard-container">
  <header class="navbar">
    <div class="logo">🎵 BeatStream <span>Hub</span></div>
    <div class="user-meta">
      <span class="role-badge" [ngClass]="isAdmin ? 'badge-admin' : 'badge-user'">
        {{ userRole }} View
      </span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </header>

  <div class="dashboard-layout">
    <aside class="form-panel" *ngIf="isAdmin">
      <div class="glass-card">
        <h3>Track Intake</h3>
        <p class="panel-sub">Append a new record directly to the database</p>
        
        <form (ngSubmit)="saveTrack()" #musicForm="ngForm">
          <div class="field">
            <label>Song Title</label>
            <input type="text" [(ngModel)]="newTrack.title" name="title" required placeholder="e.g., Blinding Lights">
          </div>
          <div class="field">
            <label>Artist</label>
            <input type="text" [(ngModel)]="newTrack.artist" name="artist" required placeholder="e.g., The Weeknd">
          </div>
          <div class="field">
            <label>YouTube Link</label>
            <input type="url" [(ngModel)]="newTrack.youtube_link" name="youtube_link" required placeholder="https://youtube.com/...">
          </div>
          <button type="submit" [disabled]="!musicForm.valid" class="btn-submit">Publish Track</button>
        </form>
      </div>
    </aside>

    <main class="stream-panel" [ngClass]="{'full-width': !isAdmin}">
      <div class="stream-header">
        <h2>Sound Catalog</h2>
        <p>Showing {{ musicList.length }} entries found inside <code>music</code> table</p>
      </div>

      <div class="music-grid" *ngIf="musicList.length > 0; else emptyState">
        <div class="music-card" *ngFor="let track of musicList">
          <div class="card-cover">
            <span class="disc-icon">💿</span>
            <a [href]="track.youtube_link" target="_blank" class="play-overlay">
              <span class="play-btn">▶ Play</span>
            </a>
          </div>
          <div class="card-body">
            <h4>{{ track.title }}</h4>
            <p>{{ track.artist }}</p>
          </div>
          <div class="card-footer">
            <a [href]="track.youtube_link" target="_blank" class="link-yt">Watch on YouTube</a>
            <button *ngIf="isAdmin" class="btn-delete" (click)="deleteTrack(track.id!)" title="Remove Track">
              🗑️
            </button>
          </div>
        </div>
      </div>

      <ng-template #emptyState>
        <div class="empty-card">
          <p>No tracks available in the catalog database.</p>
        </div>
      </ng-template>
    </main>
  </div>
</div>
